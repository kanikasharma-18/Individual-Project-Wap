<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Kaushan+Script&family=Yellowtail&family=Permanent+Marker&family=Bangers&family=Courgette&display=swap" rel="stylesheet">
</head>
<body>


    <!-- nav bar -->
    <nav>
        <h3>Find Your Next Anime</h3>
        <h2>Otaku Oracle</h2>
        <div class="nav-link">
            <a href="">Browse</a>
            <a href="">Dark Mode</a>
            <a href="">Profile</a>
        </div>
    </nav>

     <!-- hero section -->
    <div class="hero-bg" id="heroBg"></div>
 
    <!-- left panel -->
    <div class="hero-info" id="heroInfo">
      <div class="hero-rank" id="heroRank">— TRENDING #1</div>
      <div class="hero-title" id="heroTitle">Loading...</div>
      <div class="hero-score" id="heroScore">⭐</div>
      <div class="hero-synopsis" id="heroSynopsis"></div>
      <div class="hero-actions">
        <button class="btn-watch">▶ Watch Now</button>
        <button class="btn-info">+ Watchlist</button>
      </div>
    </div>

    <!-- image slider -->
    <div class="hero-slider">
      <div class="slides-track" id="slidesTrack"></div>
    </div>
 
    <!-- arrows -->
    <button class="hero-arrow left" id="prevBtn">&#8592;</button>
    <button class="hero-arrow right" id="nextBtn">&#8594;</button>
 
    <!-- dots -->
    <div class="hero-dots" id="heroDots"></div>

     


    <script src="script.js"></script>
</body>
</html>
